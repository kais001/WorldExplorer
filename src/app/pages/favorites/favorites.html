<section class="favorites-page">
  <h1>Favorites</h1>

  @if (viewState$ | async; as vm) {
    @if (vm.loading) {
      <p>Loading favorites...</p>
    } @else if (vm.errorMessage) {
      <p class="error-message">{{ vm.errorMessage }}</p>
    } @else if (vm.favoriteCountries.length === 0) {
      <p>No favorite countries yet.</p>
    } @else {
      <div class="favorites-grid">
        @for (country of vm.favoriteCountries; track country.cca3) {
          <app-country-card [country]="country"></app-country-card>
        }
      </div>
    }
  }
</section>
