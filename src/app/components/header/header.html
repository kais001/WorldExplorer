<header class="header-shell">
  <div class="header-card">
    <div class="top-row">
      <div class="brand">
        <div class="brand-badge">🌍</div>
        <div>
          <h1>World Explorer</h1>
          <p>Discover countries by region and favorites</p>
        </div>
      </div>

      <div class="main-links">
        <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
          All
        </a>
        <a routerLink="/favorites" routerLinkActive="active-link">
          Favorites
        </a>
      </div>
    </div>

    <div class="regions-row">
      <span class="regions-label">Regions</span>

      <div class="regions-list">
        @for (region of regions; track region) {
          <a
            class="region-pill"
            [routerLink]="['/region', region]"
            routerLinkActive="active-pill">
            {{ region }}
          </a>
        }
      </div>
    </div>
  </div>
</header>
