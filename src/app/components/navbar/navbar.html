<section class="letters-shell">
  <div class="letters-card">
    <div class="letters-title">Browse by letter</div>

    <div class="letters-grid">
      @for (letter of letters; track letter) {
        <a
          [routerLink]="['/letter', letter]"
          routerLinkActive="active-letter"
          class="letter-chip">
          {{ letter }}
        </a>
      }
    </div>
  </div>
</section>
